# GC Futures Order-Flow AI System — central configuration
# Authoritative spec: gc_orderflow_plan_v2.md (v2.5). No hardcoded values in code.

[project]
name = "gc_orderflow_ai"
spec_version = "v2.5"

[data]
dataset = "GLBX.MDP3"
schema = "mbo"
symbols = ["GC.FUT"]
stype_in = "parent"
raw_archive_dir = "data/raw_mbo/daily"
# Step 0 requirement: actual archive path and measured size recorded here.
raw_archive_size_du = "106G"                # du -sh data/raw_mbo/daily, 2026-07-08
archive_start = 2017-05-21
archive_end = 2026-03-31
known_missing_days = [2020-02-28]           # unrecoverable, quarantined (R10)
known_gaps_doc = "data/raw_mbo/KNOWN_GAPS.md"

[data.dev_slice]
# Step 2: ~2-week early-2026 development slice (develop small, scale later).
# Chosen: two full trading weeks incl. Sunday opens, roll-free (GCG6 front),
# no degraded/missing days (verified by the inventory audit).
start = 2026-01-04
end = 2026-01-16

[storage]
# v2.5 Hardware Profile placement rules.
capacity_tier = "/home (sda2, SATA ext4)"   # raw archive lives here, immutable
fast_tier = "/ (nvme0n1p2, NVMe ext4)"      # plan: processed data goes here
processed_dir = "data/processed"
features_dir = "data/features"
labels_dir = "data/labels"
calendar_dir = "data/calendar"
sample_index_dir = "data/sample_index"
reports_dir = "reports"
# DEVIATION NOTE: processed_dir currently resolves inside the repo on the
# CAPACITY tier because the working sandbox is restricted to this repo.
# Harmless at dev-slice scale; re-point processed/features/labels to an NVMe
# path before full-archive processing. Nothing is ever placed on CIFS.

[performance]
# Phase 0 throughput requirements (CI-enforced).
sustained_events_per_sec = 200000           # single core, historical replay
burst_events_per_sec = 500000               # for >= 5 s without queue growth
burst_duration_s = 5
live_p99_event_to_feature_ms = 5
batch_workers = 10                          # session-per-worker, 12c/24t host
worker_memory_cap_gb = 4

[determinism]
# Phase 0: same raw DBN file twice => byte-identical outputs (CI test).
replay_twice_byte_identical = true

[engine]
# Phase 1 raw MBO data engine behavior.
core = "rust-pyo3"                          # Phase 0 Option A decision
dbn_version_policy = "upgrade_to_v3"        # reader handles every encoding version present
allow_unknown_order_events = true           # counted as data-quality incidents, never crash
sequence_policy = "log"                     # decreasing sequence => incident (log|halt)
invariant_policy = "log"                    # R1 invariants: log incidents + counts; tests assert 0 on clean data
store_vs_levels_audit_interval = 1000000    # events between full order-store vs level-aggregate reconciliations
max_incident_records = 10000                # ring buffer of detailed incidents kept in memory

[roll]
# Phase 1 contract-roll policy (full ledger emitted at Step 12.5).
rule = "volume_cross"                       # roll when next month volume > front for N consecutive sessions
volume_cross_sessions = 2
# Step 12.5 artifacts: per-session volume scans + the active-contract ledger
scan_dir = "data/processed/roll_scan"
ledger_file = "data/calendar/contract_ledger.parquet"
# GC termination of trading: third-to-last business day of the delivery
# month. v1 business-day rule = weekdays (CME holiday calendar not yet
# ingested; documented approximation, affects days_to_expiry by <=1-2 days
# around holidays, never the roll decision which is volume-driven).
expiry_rule = "third_last_business_day"

[costs]
# Physical facts — NEVER normalized (Critical Rule 21).
tick_size_pts = 0.1
tick_value_usd = 10.0
round_trip_ticks_min = 1.5
round_trip_ticks_max = 2.5

[gpu]
model = "RTX 2080 SUPER 8GB (Turing, CC 7.5)"
driver = "580.82.07"
amp = "fp16"                                # no bfloat16 on CC 7.5
# PyTorch install deferred to Phase 8 (Model B/C); verify CC 7.5 support then.

[backfill]
# Step 0 items blocked on credentials (API keys are provided ad hoc, never stored):
april_2026_to_present = "BLOCKED: requires Databento API key; price via metadata.get_cost when provided"
# MBP-10 check DEFERRED by user decision 2026-07-09: out of scope / not yet
# purchased; does NOT block Phase 2. Interim R1 defense = independent
# pure-Python cross-check + Phase 1 suite. Phase 1 is NOT MBP-10-verified.
mbp10_verification_days = "DEFERRED (2026-07-09): if ever purchased, 2-3 days each from 2017, 2020, 2023, 2025, Q1 2026 (R1 defense)"

[features]
# Phase 3 — core order-flow features (plan Phase 3, Steps 7-12).
# The compiled core emits one row of per-matching-event-group PRIMITIVES
# (facts: T-only volumes, adds/pulls at & near best, per-level OFI
# ingredients, depth aggregates, lifecycle terminations, refill links) for
# the tracked contract; all FEATURES are composed in Python by a streaming
# engine whose step() is the single code path for historical and live
# (Critical Rule 3). Raw values only in Phase 3 — the _norm twins are
# attached by Phase 4A.
near_touch_ticks = 5                        # "near the touch" band for add/pull flow
book_levels = 10                            # MLOFI / depth aggregation levels (plan: 1-10)
# rolling windows (seconds) used by the Phase 3 feature set; every feature
# states which window(s) it uses. Short = tactical flow, mid = structure,
# long = baseline for intensity/impact normalizers within a session.
window_short_s = 2.0
window_mid_s = 10.0
window_long_s = 60.0
# sweep detection: a group consuming >= this many ticks of one side
sweep_min_ticks = 2
# sweep failure/reclaim lookback horizon
sweep_reclaim_s = 10.0
# a sweep counts as failed when this fraction of its move is retraced
sweep_failed_retrace = 0.8
# iceberg-probability softening constant k in n/(n+k) (v1 heuristic shape)
iceberg_softening = 4.0
flow_dir = "data/processed/flow"            # optional per-session primitive dumps

[calendar]
# Step 12.5 / plan Phase 4.5 — economic calendar and event-risk module.
# Scheduled-release data is an EXTERNAL, VERSIONED input (CSV; see
# data/calendar/README.md for the schema). Using the schedule at time t is
# calendar knowledge, not leakage — release TIMES are known in advance;
# realized values are never used.
events_file = "data/calendar/events.csv"
tz = "America/New_York"                     # CME/COMEX reference clock (DST-aware)
# session phases, minutes since midnight ET (Globex metals):
# maintenance 17:00-18:00, Asia 18:00-03:00, London 03:00-08:20,
# NY 08:20-13:30 (COMEX floor hours), post-settlement 13:30-17:00
phase_boundaries = { maintenance_start = "17:00", asia_start = "18:00", london_start = "03:00", ny_start = "08:20", post_start = "13:30" }
settlement_window = { start = "13:29", end = "13:30" }   # COMEX gold settlement
# live blackout around HIGH-impact releases (plan defaults)
blackout_pre_s = 120
blackout_post_s = 300
# label hygiene (plan Phase 4.5): windows overlapping releases
label_policy_high = "exclude"
label_policy_medium = "tag"

[lifecycle]
# Phase 2 — order lifecycle and queue engine (plan Phase 2 + Step 6).
enabled = true
# CME iceberg refill heuristic (plan Phase 2 [NEW]): link an Add to a parent
# fully-filled order at the same price/side within this window, size <= the
# parent's displayed clip. Heuristic — confidence stored, never treated as fact
# (Critical Rule 8).
iceberg_link_window_ns = 2000000            # 2 ms default per plan
iceberg_clip_tolerance = 1.0                # child size <= tol * parent displayed clip
lifecycle_dir = "data/processed/lifecycle"  # per-session Parquet output
