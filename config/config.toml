# GC Futures Order-Flow AI System — central configuration
# Authoritative spec: gc_orderflow_plan_v2.md (v2.5). No hardcoded values in code.

[project]
name = "gc_orderflow_ai"
spec_version = "v2.5"

[data]
dataset = "GLBX.MDP3"
schema = "mbo"
symbols = ["GC.FUT"]
stype_in = "parent"
raw_archive_dir = "data/raw_mbo/daily"
# Step 0 requirement: actual archive path and measured size recorded here.
raw_archive_size_du = "106G"                # du -sh data/raw_mbo/daily, 2026-07-08
archive_start = 2017-05-21
archive_end = 2026-03-31
known_missing_days = [2020-02-28]           # unrecoverable, quarantined (R10)
known_gaps_doc = "data/raw_mbo/KNOWN_GAPS.md"

[data.dev_slice]
# Step 2: ~2-week early-2026 development slice (develop small, scale later).
# Chosen: two full trading weeks incl. Sunday opens, roll-free (GCG6 front),
# no degraded/missing days (verified by the inventory audit).
start = 2026-01-04
end = 2026-01-16

[storage]
# v2.5 Hardware Profile placement rules.
capacity_tier = "/home (sda2, SATA ext4)"   # raw archive lives here, immutable
fast_tier = "/ (nvme0n1p2, NVMe ext4)"      # plan: processed data goes here
processed_dir = "data/processed"
features_dir = "data/features"
labels_dir = "data/labels"
calendar_dir = "data/calendar"
sample_index_dir = "data/sample_index"
reports_dir = "reports"
# DEVIATION NOTE: processed_dir currently resolves inside the repo on the
# CAPACITY tier because the working sandbox is restricted to this repo.
# Harmless at dev-slice scale; re-point processed/features/labels to an NVMe
# path before full-archive processing. Nothing is ever placed on CIFS.

[performance]
# Phase 0 throughput requirements (CI-enforced).
sustained_events_per_sec = 200000           # single core, historical replay
burst_events_per_sec = 500000               # for >= 5 s without queue growth
burst_duration_s = 5
live_p99_event_to_feature_ms = 5
batch_workers = 10                          # session-per-worker, 12c/24t host
worker_memory_cap_gb = 4

[determinism]
# Phase 0: same raw DBN file twice => byte-identical outputs (CI test).
replay_twice_byte_identical = true

[engine]
# Phase 1 raw MBO data engine behavior.
core = "rust-pyo3"                          # Phase 0 Option A decision
dbn_version_policy = "upgrade_to_v3"        # reader handles every encoding version present
allow_unknown_order_events = true           # counted as data-quality incidents, never crash
sequence_policy = "log"                     # decreasing sequence => incident (log|halt)
invariant_policy = "log"                    # R1 invariants: log incidents + counts; tests assert 0 on clean data
store_vs_levels_audit_interval = 1000000    # events between full order-store vs level-aggregate reconciliations
max_incident_records = 10000                # ring buffer of detailed incidents kept in memory

[roll]
# Phase 1 contract-roll policy (full ledger emitted at Step 12.5).
rule = "volume_cross"                       # roll when next month volume > front for N consecutive sessions
volume_cross_sessions = 2
# Step 12.5 artifacts: per-session volume scans + the active-contract ledger
scan_dir = "data/processed/roll_scan"
ledger_file = "data/calendar/contract_ledger.parquet"
# GC termination of trading: third-to-last business day of the delivery
# month. v1 business-day rule = weekdays (CME holiday calendar not yet
# ingested; documented approximation, affects days_to_expiry by <=1-2 days
# around holidays, never the roll decision which is volume-driven).
expiry_rule = "third_last_business_day"

[costs]
# Physical facts — NEVER normalized (Critical Rule 21).
tick_size_pts = 0.1
tick_value_usd = 10.0
round_trip_ticks_min = 1.5
round_trip_ticks_max = 2.5

[gpu]
model = "RTX 2080 SUPER 8GB (Turing, CC 7.5)"
driver = "580.82.07"
amp = "fp16"                                # no bfloat16 on CC 7.5
# PyTorch install deferred to Phase 8 (Model B/C); verify CC 7.5 support then.

[backfill]
# Step 0 items blocked on credentials (API keys are provided ad hoc, never stored):
april_2026_to_present = "BLOCKED: requires Databento API key; price via metadata.get_cost when provided"
# MBP-10 check DEFERRED by user decision 2026-07-09: out of scope / not yet
# purchased; does NOT block Phase 2. Interim R1 defense = independent
# pure-Python cross-check + Phase 1 suite. Phase 1 is NOT MBP-10-verified.
mbp10_verification_days = "DEFERRED (2026-07-09): if ever purchased, 2-3 days each from 2017, 2020, 2023, 2025, Q1 2026 (R1 defense)"

[features]
# Phase 3 — core order-flow features (plan Phase 3, Steps 7-12).
# The compiled core emits one row of per-matching-event-group PRIMITIVES
# (facts: T-only volumes, adds/pulls at & near best, per-level OFI
# ingredients, depth aggregates, lifecycle terminations, refill links) for
# the tracked contract; all FEATURES are composed in Python by a streaming
# engine whose step() is the single code path for historical and live
# (Critical Rule 3). Raw values only in Phase 3 — the _norm twins are
# attached by Phase 4A.
near_touch_ticks = 5                        # "near the touch" band for add/pull flow
book_levels = 10                            # MLOFI / depth aggregation levels (plan: 1-10)
# rolling windows (seconds) used by the Phase 3 feature set; every feature
# states which window(s) it uses. Short = tactical flow, mid = structure,
# long = baseline for intensity/impact normalizers within a session.
window_short_s = 2.0
window_mid_s = 10.0
window_long_s = 60.0
# sweep detection: a group consuming >= this many ticks of one side
sweep_min_ticks = 2
# sweep failure/reclaim lookback horizon
sweep_reclaim_s = 10.0
# a sweep counts as failed when this fraction of its move is retraced
sweep_failed_retrace = 0.8
# iceberg-probability softening constant k in n/(n+k) (v1 heuristic shape)
iceberg_softening = 4.0
flow_dir = "data/processed/flow"            # optional per-session primitive dumps

[normalization]
# Phase 4/4A — the canonical normalization architecture. Three rolling,
# strictly past-only, robust (median) scales, reset at session boundaries
# (the 18:00-ET trading-day anchor — every daily file contains the
# 17:00-18:00 ET maintenance break) and at contract rolls; computed
# identically historical/live; stored alongside what they normalize.
scale_window_s = 3600                       # trailing 60 min (plan default)
sample_period_s = 1                         # scales update on a 1-second past-only clock
sigma_horizons_s = [30, 120, 600]           # sigma_h for h = 30s / 2m / 10m (Phase 7)
# which sigma_h normalizes FEATURE distances (labels use their own h;
# decision documented in the Phase 4 report):
distance_sigma_horizon_s = 120
d_scale_levels = 5                          # top-5 depth, combined sides (plan default)
d_scale_sides = "combined"
min_samples = 30                            # warm-up: _norm = NaN until each scale has this many samples
# rolling-percentile features (plan Phase 4; past-only, window never spans
# a session boundary). Format: feature = window_seconds.
[normalization.percentiles]
absorption_net_s = 3600                     # plan's example: absorption percentile, 60m
spread_ticks = 3600                         # spread regime widening (do-not-normalize list)
trade_burst_intensity_s = 3600

# robust z-scores ((x - median)/MAD, streaming, past-only). Default: only
# demonstration coverage — the 4A scale twins already handle volumes and
# distances; z-scores serve quantities without a canonical scale.
[normalization.robust_z]
liquidity_age_bid_s = 3600

[inputs]
# Phase 5 — final model input architecture (Steps 13-17). The five inputs
# are assembled by ONE streaming consumer (same step() historical/live).
# 1,024 / 64 / 256 are the plan's configurable starting values.
event_window = 1024                         # input 1: last N matching events
bar_events = 64                             # input 2: meaningful events per adaptive bar
bar_max_duration_s = 15.0                   # ... with a max-duration close rule
bar_window = 256                            # last N bars
tactical_steps = 300                        # input 3: 5 min at 1 s
tactical_step_s = 1.0
slow_steps = 180                            # input 4: 30 min at 10 s
slow_step_s = 10.0
# input 5: percentile comparison windows (seconds; session = trailing 24h cap)
regime_windows_s = [60, 300, 900, 3600, 86400]
# input-standardization layer (plan 4A; statistics are FIT in Phase 8 on
# the training set and serialized with the model bundle)
winsorize_bound = 8.0

[labels]
# Phase 6/7 — Step 18. Labels on TRADEABLE prices (plan Phase 7 [NEW]):
# entry at the aggressive side (long: best ask, short: best bid), exits
# marked at the touch of the opposite side (default convention; stored in
# metadata). Horizons follow [normalization] sigma_horizons_s (Phase 7:
# 30s primary / 2m secondary / 10m experimental).
convention = "touch_opposite"
# explicit cost model (physical facts, NEVER normalized — Critical Rule 21):
# spread ~1 tick + slippage 0.5-1 tick + fees => 1.5-2.5 ticks round trip
cost_round_trip_ticks = 2.0
# direction classes: cost-adjusted favorable move must exceed this multiple
# of the cost-adjusted adverse move (thresholds live in sigma units at
# evaluation time — Critical Rule 21 / plan Phase 7)
direction_ratio = 2.0
# label path granularity: per-second bid/ask extremes (carry-forward
# through quiet seconds — the resting book persists)
path_resolution_s = 1

[samples]
# Phase 6 — Step 19. Sample index (index only; clock-time streams are
# stored continuously — plan Phase 6).
base_rate_hz = 1.0                          # ~1 sample/second in active periods
min_spacing_s = 0.5                         # minimum spacing rule (any two samples)
event_cap_per_type_per_session = 300        # event-trigger caps (plan Phase 6)
# event triggers (evaluated per row on PAST-ONLY features; same pure
# function live). Thresholds on the Phase 3/4 outputs:
trigger_absorption_net = 0.35               # |absorption_net_s| onset crossing
trigger_mlofi_norm = 5.0                    # |mlofi_near_s_norm|
trigger_burst = 0.9                         # trade_burst_intensity_s
trigger_depletion = 0.9                     # max(queue_depletion bid/ask)
trigger_vacuum = 0.9                        # max(liquidity_vacuum up/down)
trigger_replenish = 0.98                    # max(replenish bid/ask)
sample_index_dir = "data/sample_index"

[gate]
# ============================================================================
# STEP 20 GO/NO-GO GATE — PRE-REGISTERED 2026-07-11, BEFORE ANY TRAINING.
# Plan Phase 8: "Record the gate criteria in config before training so they
# cannot be moved after seeing results." DO NOT EDIT AFTER THIS DATE except
# to append results; the gate decision uses THESE values.
# ============================================================================
# Model A: LightGBM multiclass (NO_TRADE/BULLISH/BEARISH), 30 s horizon ONLY,
# engineered features at sample instants (_norm variants; mid_ticks excluded
# as an absolute-price era proxy). Fixed seed; deterministic single-thread
# histogram building.
horizon_s = 30
seed = 20260711
# out-of-sample evaluation period (inside the frozen VALIDATE year; the
# frozen test 2025 and holdout Q1-2026 remain untouched):
oos_start = 2024-01-02
oos_end = 2024-03-28                        # ~61 trading days >= plan's 20
# training-window variants (plan Phase 0 / Step 20), all ending 2023-12-31,
# purged + embargoed against the OOS period per [splits]:
variant_12m_start = 2023-01-01
variant_3y_start = 2021-01-01
variant_full_start = 2017-05-21
train_end = 2023-12-31
# uniqueness weighting: BOTH variants trained (plan Phase 6 "test both");
# the gate passes if ANY (window x weighting) combination meets ALL criteria.
#
# --- PRE-REGISTERED PASS CRITERIA (ALL must hold for a combination) --------
# 1. ECONOMIC: mean expectancy of top-decile-confidence directional
#    predictions, after the [labels] cost model, > 0 points on OOS, with
#    trades on >= 20 distinct sessions. (Expectancy proxy: mid-based
#    30 s final return signed by predicted direction, minus the round-trip
#    cost — conservative and identical for all combinations.)
min_trade_sessions = 20
top_confidence_decile = 0.9
# 2. STATISTICAL: direction discrimination meaningfully above chance —
#    one-vs-rest ROC-AUC (mean of BULLISH and BEARISH) >= 0.55 on OOS, AND
#    multiclass Brier score at least 2% (relative) better than the
#    unconditional class-frequency baseline.
min_auc = 0.55
min_brier_improvement = 0.02
# 3. ROBUSTNESS: the edge is not concentration — top-decile expectancy
#    stays > 0 (a) with the single best session removed, and (b) with all
#    release-tagged sessions removed.
# ---------------------------------------------------------------------------
# --- data-prep methodology (appended 2026-07-11, still BEFORE training) ----
# training rows per session are capped by uniform striding of CLOCK samples
# (event-triggered samples always kept) so the full-history variant fits in
# RAM; evaluation runs on the FULL-resolution OOS index. Features: all f_*
# columns except f_mid_ticks (absolute price = era proxy). Fixed LightGBM
# params in src/models/model_a.py (no tuning loop — nothing to peek with).
train_max_clock_rows_per_session = 12000
# If the gate FAILS: iterate on features, labels, sampling (plan) — do NOT
# escalate to Models B/C, and do NOT edit the criteria.
#
# --- RESULT (appended 2026-07-11; criteria above untouched) ----------------
# VERDICT: NO-GO (reports/model_a_gate.md). All 6 combos: statistical
# criteria PASS decisively (AUC 0.877-0.880, BrierΔ +5.5-5.7%); economic +
# robustness expectancy FAIL (-0.193..-0.199 pts/trade after 0.2 pt cost).
# Diagnosis: move-timing skill 0.880 AUC, sign skill 0.556 AUC — iterate on
# sign-carrying features/labels/sampling per the plan; Models B/C stay off.

[splits]
# Phase 9 — purged + embargoed splitting (never merely chronological,
# NEVER shuffled). The outer split is FROZEN (v2.4; do not change):
frozen_train_end = 2023-12-31               # train 2017-2023 (COVID stratum tagged)
frozen_val_end = 2024-12-31                 # validate 2024
frozen_test_end = 2025-12-31                # test 2025
# final holdout: Q1 2026 — evaluated ONCE, at the very end (R7)
# purging: training samples whose label window (label_end_ts) overlaps the
# eval period are removed. Embargo: plan minimum = one max label horizon
# (10 min); recommended and default = one full session.
embargo_sessions = 1
min_embargo_s = 600

[calendar]
# Step 12.5 / plan Phase 4.5 — economic calendar and event-risk module.
# Scheduled-release data is an EXTERNAL, VERSIONED input (CSV; see
# data/calendar/README.md for the schema). Using the schedule at time t is
# calendar knowledge, not leakage — release TIMES are known in advance;
# realized values are never used.
events_file = "data/calendar/events.csv"
tz = "America/New_York"                     # CME/COMEX reference clock (DST-aware)
# session phases, minutes since midnight ET (Globex metals):
# maintenance 17:00-18:00, Asia 18:00-03:00, London 03:00-08:20,
# NY 08:20-13:30 (COMEX floor hours), post-settlement 13:30-17:00
phase_boundaries = { maintenance_start = "17:00", asia_start = "18:00", london_start = "03:00", ny_start = "08:20", post_start = "13:30" }
settlement_window = { start = "13:29", end = "13:30" }   # COMEX gold settlement
# live blackout around HIGH-impact releases (plan defaults)
blackout_pre_s = 120
blackout_post_s = 300
# label hygiene (plan Phase 4.5): windows overlapping releases
label_policy_high = "exclude"
label_policy_medium = "tag"

[lifecycle]
# Phase 2 — order lifecycle and queue engine (plan Phase 2 + Step 6).
enabled = true
# CME iceberg refill heuristic (plan Phase 2 [NEW]): link an Add to a parent
# fully-filled order at the same price/side within this window, size <= the
# parent's displayed clip. Heuristic — confidence stored, never treated as fact
# (Critical Rule 8).
iceberg_link_window_ns = 2000000            # 2 ms default per plan
iceberg_clip_tolerance = 1.0                # child size <= tol * parent displayed clip
lifecycle_dir = "data/processed/lifecycle"  # per-session Parquet output
